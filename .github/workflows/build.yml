name: 🎙️ Build StealthRec IPA

on:
  push:
    branches:
      - master
      - main
      - debug-minimal
  workflow_dispatch:
    inputs:
      release_note:
        description: '版本备注（可选）'
        required: false
        default: '最新构建'

jobs:
  build:
    name: Build on macOS
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      # 1. 检出代码
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 2. 显示 Xcode 版本（使用 Runner 自带，macos-14 默认含 Xcode 15.x）
      - name: 🛠️ Show Xcode version
        run: |
          xcodebuild -version
          swift --version

      # 3. 安装 xcpretty（美化编译输出）
      - name: 💎 Install xcpretty
        run: gem install xcpretty --no-document

      # 4. 安装 XcodeGen（从 project.yml 生成 xcodeproj）
      - name: 📦 Install XcodeGen
        run: |
          brew install xcodegen
          xcodegen --version

      # 5. 安装 ldid（注入 TrollStore 特权 entitlements）
      - name: 📦 Install ldid
        run: brew install ldid

      # 6. 验证 Info.plist 版本（防止版本号没被正确注入）
      - name: 🔍 Verify project.yml and plist
        run: |
          echo "=== project.yml MARKETING_VERSION ==="
          grep -E 'MARKETING_VERSION|CURRENT_PROJECT_VERSION' project.yml
          echo "=== Info.plist CFBundleVersion ==="
          cat StealthRec/Resources/Info.plist

      # 7. 生成 Xcode 项目
      - name: 📋 Generate Xcode project
        run: |
          xcodegen generate --spec project.yml
          ls -la StealthRec.xcodeproj/

      # 7. 编译（不签名，完整日志输出）
      - name: 🔨 Build with xcodebuild
        run: |
          xcodebuild \
            -project StealthRec.xcodeproj \
            -scheme StealthRec \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64" \
            VALID_ARCHS="arm64" \
            2>&1 | tee build.log | xcpretty --color; EXIT=${PIPESTATUS[0]}

          if [ $EXIT -ne 0 ]; then
            echo "❌ 编译失败 (exit $EXIT)，显示最后 100 行日志："
            tail -100 build.log
            exit $EXIT
          fi

          # 验证编译结果
          APP_PATH=$(find build -name "*.app" -type d | grep -v ".dSYM" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ 找不到 .app 包"
            exit 1
          fi
          echo "✅ 找到 App 包：$APP_PATH"
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

          # 验证打包后的 Info.plist 版本
          echo "=== Built Info.plist Contents ==="
          cat "$APP_PATH/Info.plist" || plutil -p "$APP_PATH/Info.plist" || true
          echo "=== CFBundleShortVersionString ==="
          /usr/libexec/PlistBuddy -c 'Print CFBundleShortVersionString' "$APP_PATH/Info.plist"
          echo "=== CFBundleVersion ==="
          /usr/libexec/PlistBuddy -c 'Print CFBundleVersion' "$APP_PATH/Info.plist"

      # 8. 注入 TrollStore 特权 Entitlements
      - name: 🔑 Inject entitlements with ldid
        run: |
          BINARY="${{ env.APP_PATH }}/StealthRec"
          ENTITLEMENTS="StealthRec/App/StealthRec.entitlements"
          ldid -S"$ENTITLEMENTS" "$BINARY"
          echo "✅ Entitlements 注入完成"
          ldid -e "$BINARY" | head -20 || true

      # 9. 打包为 IPA
      - name: 📦 Package IPA
        run: |
          mkdir -p Payload
          cp -r "${{ env.APP_PATH }}" Payload/
          zip -r StealthRec.ipa Payload/ -x "*.DS_Store" -x "__MACOSX/*"
          rm -rf Payload/
          ls -lh StealthRec.ipa
          echo "✅ IPA 打包完成：$(du -sh StealthRec.ipa | cut -f1)"

      # 10. 上传 IPA（保存 7 天）
      - name: ⬆️ Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StealthRec-Build-${{ github.run_number }}
          path: StealthRec.ipa
          retention-days: 7
          if-no-files-found: error

      # 11. 构建摘要
      - name: 📊 Build Summary
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  StealthRec 构建报告  #${{ github.run_number }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ -f StealthRec.ipa ]; then
            echo "状态: ✅ 成功"
            echo "大小: $(du -sh StealthRec.ipa | cut -f1)"
            echo ""
            echo "安装步骤:"
            echo "1. Actions 页面 → Artifacts 下载 IPA"
            echo "2. AirDrop 传到 iPhone 7"
            echo "3. 巨魔商店打开安装"
          else
            echo "状态: ❌ 失败，查看上方日志"
          fi
